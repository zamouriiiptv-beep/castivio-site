<!-- Banner de Consentimento de Cookies -->
<div id="cookie-banner" style="display:none; position:fixed; bottom:0; left:0; right:0; z-index:9999; background:#1e1b4b; border-top:1px solid #4f46e5; padding:16px 24px;">
  <div style="max-width:900px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;">

      <a href="/pt/privacy-policy/" style="color:#a5b4fc; text-decoration:underline;">Política de Privacidade</a>
    </p>
    <button onclick="acceptCookies()" style="background:#4f46e5; color:#fff; border:none; border-radius:12px; padding:10px 24px; font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap;">
      Aceitar
    </button>
  </div>
</div>
<script>
  function acceptCookies() {
    localStorage.setItem('cookiesAccepted', '1');
    document.getElementById('cookie-banner').style.display = 'none';
  }
  if (!localStorage.getItem('cookiesAccepted')) {
    document.getElementById('cookie-banner').style.display = 'block';
  }
