workflows:

  prime-player-android:
    name: Prime Player – Android APK
    max_build_duration: 120
    instance_type: linux_x2

    environment:
      flutter: stable
      java: 17

    working_directory: prime-player

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Diagnostics
        script: |
          echo "=== Flutter version ==="
          flutter --version
          echo "=== Plugins ==="
          cat .flutter-plugins 2>/dev/null || echo "(no .flutter-plugins)"
          echo "=== Plugin dependencies ==="
          cat .flutter-plugins-dependencies 2>/dev/null || echo "(no .flutter-plugins-dependencies)"

      - name: Build APK (release)
        script: |
          flutter build apk --release

      - name: Share APK download link
        script: |
          APK=$(find build -name "app-release.apk" | head -1)
          echo "APK path: $APK"
          if [ -f "$APK" ]; then
            echo "APK size: $(du -h "$APK" | cut -f1)"
            echo "Uploading to gofile.io..."
            SERVER=$(curl -s "https://api.gofile.io/servers" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['data']['servers'][0]['name'])" 2>/dev/null)
            [ -z "$SERVER" ] && SERVER="store1"
            echo "Server: $SERVER"
            RESP=$(curl -s -F "file=@$APK" "https://$SERVER.gofile.io/contents/uploadfile")
            echo "Response: $RESP"
            LINK=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['downloadPage'])" 2>/dev/null)
            echo "================================"
            echo "APK DOWNLOAD LINK: $LINK"
            echo "================================"
          else
            echo "APK file not found"
          fi

    artifacts:
      - prime-player/build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - zamouriiiptv@gmail.com
        notify:
          success: true
          failure: true
