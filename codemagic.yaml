workflows:

  prime-player-android:
    name: Prime Player – Android APK (arm64)
    max_build_duration: 90
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    environment:
      flutter: 3.29.3
      java: 17

    working_directory: prime-player

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build APK (arm64 release)
        script: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --target-platform android-arm64 \
            --no-pub

    artifacts:
      - prime-player/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

    publishing:
      email:
        recipients:
          - zamouriiiptv@gmail.com
        notify:
          success: true
          failure: true
