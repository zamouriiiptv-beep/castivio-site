workflows:

  prime-player-android:
    name: Prime Player – Android APK (arm64)
    max_build_duration: 90
    instance_type: linux

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    environment:
      flutter: 3.29.3
      java: 17

    scripts:
      - name: Get Flutter packages
        working_directory: prime-player
        script: flutter pub get

      - name: Build APK (arm64 release)
        working_directory: prime-player
        script: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --target-platform android-arm64 \
            --no-pub

      - name: Upload APK to gofile.io
        working_directory: prime-player
        script: |
          APK="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"
          if [ -f "$APK" ]; then
            echo "APK size: $(du -h "$APK" | cut -f1)"
            SERVER=$(curl -s "https://api.gofile.io/servers" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['data']['servers'][0]['name'])" 2>/dev/null)
            [ -z "$SERVER" ] && SERVER="store1"
            RESP=$(curl -s -F "file=@$APK" "https://$SERVER.gofile.io/contents/uploadfile")
            LINK=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['downloadPage'])" 2>/dev/null)
            echo "================================"
            echo "APK DOWNLOAD LINK: $LINK"
            echo "================================"
          else
            echo "APK not found"
          fi

    artifacts:
      - prime-player/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
