workflows:
  android-release:
    name: Prime Player – Android APK
    max_build_duration: 120
    environment:
      flutter: 3.29.3
      java: 17
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $HOME/.pub-cache
    scripts:
      - name: Get Flutter packages
        script: |
          cd prime-player
          flutter pub get
      - name: Build release APK
        script: |
          cd prime-player
          flutter build apk --release --no-tree-shake-icons --split-per-abi
    artifacts:
      - prime-player/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
      - prime-player/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
      - prime-player/build/app/outputs/flutter-apk/app-x86_64-release.apk
    publishing:
      email:
        recipients:
          - zamouriiiptv@gmail.com
        notify:
          success: true
          failure: true
