workflows:
  android-release:
    name: Prime Player – Android APK
    max_build_duration: 75
    environment:
      flutter: 3.29.3
      java: 17
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - $HOME/.pub-cache
        - prime-player/android/.gradle
    scripts:
      - name: Get Flutter packages
        script: |
          cd prime-player
          timeout 900 flutter pub get
      - name: Build release APK (arm64)
        script: |
          cd prime-player
          timeout 3000 flutter build apk --release --no-tree-shake-icons --target-platform android-arm64 --no-pub
    artifacts:
      - prime-player/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    publishing:
      email:
        recipients:
          - zamouriiiptv@gmail.com
        notify:
          success: true
          failure: true
