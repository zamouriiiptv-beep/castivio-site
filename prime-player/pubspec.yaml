name: prime_player
description: Prime Player – Ultra-fast IPTV player by Prime IPTV
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # ─── Video (libmpv — instant channel switching, no initialize() wait) ────────
  media_kit: ^1.1.11
  media_kit_video: ^1.1.6
  media_kit_libs_android_video: ^1.0.4

  # ─── State Management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ─── Storage ─────────────────────────────────────────────────────────────────
  hive_flutter: ^1.1.0

  # ─── Networking ──────────────────────────────────────────────────────────────
  dio: ^5.4.3

  # ─── Utils ───────────────────────────────────────────────────────────────────
  uuid: ^4.4.0

  # ─── UI ──────────────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
