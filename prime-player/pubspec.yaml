name: prime_player
description: Prime Player – Ultra-fast IPTV player by Prime IPTV
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # ─── Video Engine ────────────────────────────────────────────────────────────
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.0.4   # Android native libs (libmpv)

  # ─── State Management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ─── Storage ─────────────────────────────────────────────────────────────────
  hive_flutter: ^1.1.0

  # ─── Networking ──────────────────────────────────────────────────────────────
  dio: ^5.4.3

  # ─── Utils ───────────────────────────────────────────────────────────────────
  uuid: ^4.4.0

  # ─── UI ──────────────────────────────────────────────────────────────────────
  cached_network_image: ^3.3.1
  wakelock_plus: ^1.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
