<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>if('scrollRestoration'in history){history.scrollRestoration='manual';}window.scrollTo(0,0);</script>
<style>html{background:#050014}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <link rel="canonical" href="https://primeiptvplus.com/review/">
  <title>أضف تقييمك – Castivio</title>
  <link rel="preload" href="/images/logo.webp" as="image" fetchpriority="high">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap"></noscript>
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      background: #04010c;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 65% at 50% 35%, rgba(123,47,255,0.30) 0%, transparent 66%),
        radial-gradient(ellipse 55% 50% at 90% 10%, rgba(176,38,255,0.16) 0%, transparent 52%),
        radial-gradient(ellipse 55% 45% at 8% 68%, rgba(99,102,241,0.13) 0%, transparent 50%),
        linear-gradient(180deg, #0a0418 0%, #04010c 100%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(18, 4, 36, 0.88);
      border: 1px solid rgba(168,85,247,0.28);
      border-radius: 28px;
      padding: 44px 40px;
      width: 100%;
      max-width: 500px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 80px rgba(123,47,255,0.18),
        0 0 1px rgba(168,85,247,0.40);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo img {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      box-shadow: 0 0 24px rgba(168,85,247,0.55);
    }

    .logo h1 {
      font-size: 1.35rem;
      font-weight: 800;
      color: #e9d5ff;
      margin-top: 10px;
      text-shadow: 0 0 20px rgba(168,85,247,0.6);
      letter-spacing: 0.5px;
    }

    h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #d8b4fe;
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.86rem;
      color: rgba(255,255,255,0.72);
      margin-bottom: 7px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="password"],
    select,
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(168,85,247,0.28);
      border-radius: 12px;
      padding: 12px 15px;
      color: #fff;
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(168,85,247,0.75);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.14);
      background: rgba(255,255,255,0.07);
    }

    textarea { resize: vertical; min-height: 110px; }

    select option { background: #1a0535; color: #fff; }

    /* Stars */
    .stars-wrap { margin-bottom: 4px; }
    .stars {
      display: flex;
      flex-direction: row-reverse;
      justify-content: flex-end;
      gap: 4px;
    }
    .stars input { display: none; }
    .stars label {
      font-size: 2.1rem;
      color: rgba(255,255,255,0.18);
      cursor: pointer;
      transition: color 0.15s, transform 0.15s;
      margin: 0;
    }
    .stars input:checked ~ label,
    .stars label:hover,
    .stars label:hover ~ label {
      color: #f59e0b;
      text-shadow: 0 0 10px rgba(245,158,11,0.6);
    }
    .stars label:active { transform: scale(1.2); }

    /* Button */
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
      border: none;
      border-radius: 14px;
      padding: 14px;
      color: #fff;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(124,58,237,0.40);
      margin-top: 10px;
      letter-spacing: 0.3px;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,58,237,0.55); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .err {
      color: #fca5a5;
      font-size: 0.83rem;
      text-align: center;
      margin-top: 10px;
      min-height: 20px;
    }

    /* Success */
    #success-screen { text-align: center; padding: 16px 0; }
    .success-icon { font-size: 4.5rem; margin-bottom: 18px; animation: pop .5s ease; }
    @keyframes pop { 0%{transform:scale(0.5);opacity:0} 80%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    .success-title { font-size: 1.4rem; font-weight: 800; color: #86efac; margin-bottom: 10px; }
    .success-sub { color: rgba(255,255,255,0.55); font-size: 0.9rem; line-height: 1.6; }

    /* Screens */
    #password-screen, #form-screen, #success-screen { display: none; }
    #password-screen { display: block; }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; border-radius: 20px; }
      .stars label { font-size: 1.8rem; }
    }
  </style>
</head>
<body class="hp-home">

<div class="card">

  <a href="/ar/" class="logo" style="text-decoration:none;color:inherit;display:block">
    <img src="/images/logo.webp" alt="Castivio">
    <h1><span class="faq2-grad">Castivio</span></h1>
  </a>

  <!-- ── 1. Password ── -->
  <div id="password-screen">
    <h2><i class="fas fa-lock" style="margin-left:8px;color:#a855f7"></i> أدخل كلمة المرور</h2>
    <div class="field">
      <label for="pass-input">كلمة المرور</label>
      <input type="password" id="pass-input" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')checkPass()">
    </div>
    <p class="err" id="pass-err"></p>
    <button class="btn" onclick="checkPass()">
      <i class="fas fa-arrow-left" style="margin-left:8px"></i> دخول
    </button>
  </div>

  <!-- ── 2. Form ── -->
  <div id="form-screen">
    <h2><i class="fas fa-pen-to-square" style="margin-left:8px;color:#a855f7"></i> شاركنا تجربتك</h2>

    <div class="field">
      <label for="r-name">الاسم *</label>
      <input type="text" id="r-name" placeholder="اسمك الكريم" maxlength="50">
    </div>

    <div class="field">
      <label for="r-country">الدولة *</label>
      <select id="r-country">
        <option value="">— اختر دولتك —</option>
        <option>🇲🇦 المغرب</option>
        <option>🇩🇿 الجزائر</option>
        <option>🇹🇳 تونس</option>
        <option>🇸🇦 السعودية</option>
        <option>🇦🇪 الإمارات</option>
        <option>🇶🇦 قطر</option>
        <option>🇰🇼 الكويت</option>
        <option>🇧🇭 البحرين</option>
        <option>🇴🇲 عُمان</option>
        <option>🇪🇬 مصر</option>
        <option>🇱🇾 ليبيا</option>
        <option>🇸🇩 السودان</option>
        <option>🇮🇶 العراق</option>
        <option>🇸🇾 سوريا</option>
        <option>🇱🇧 لبنان</option>
        <option>🇯🇴 الأردن</option>
        <option>🇾🇪 اليمن</option>
        <option>🇫🇷 فرنسا</option>
        <option>🇧🇪 بلجيكا</option>
        <option>🇳🇱 هولندا</option>
        <option>🇩🇪 ألمانيا</option>
        <option>🇬🇧 المملكة المتحدة</option>
        <option>🇺🇸 الولايات المتحدة</option>
        <option>🇨🇦 كندا</option>
        <option>🇪🇸 إسبانيا</option>
        <option>🇮🇹 إيطاليا</option>
        <option>🇵🇹 البرتغال</option>
        <option>🇧🇷 البرازيل</option>
        <option>🇹🇷 تركيا</option>
        <option>🌍 دولة أخرى</option>
      </select>
    </div>

    <div class="field">
      <label>التقييم *</label>
      <div class="stars-wrap">
        <div class="stars">
          <input type="radio" id="s5" name="rating" value="5"><label for="s5"><i class="fas fa-star"></i></label>
          <input type="radio" id="s4" name="rating" value="4"><label for="s4"><i class="fas fa-star"></i></label>
          <input type="radio" id="s3" name="rating" value="3"><label for="s3"><i class="fas fa-star"></i></label>
          <input type="radio" id="s2" name="rating" value="2"><label for="s2"><i class="fas fa-star"></i></label>
          <input type="radio" id="s1" name="rating" value="1"><label for="s1"><i class="fas fa-star"></i></label>
        </div>
      </div>
    </div>

    <div class="field">
      <label for="r-comment">تعليقك *</label>
      <textarea id="r-comment" placeholder="شاركنا تجربتك مع Castivio..." maxlength="500"></textarea>
    </div>

    <p class="err" id="form-err"></p>
    <button class="btn" id="submit-btn" onclick="submitReview()">
      <i class="fas fa-paper-plane" style="margin-left:8px"></i> إرسال التقييم
    </button>
  </div>

  <!-- ── 3. Success ── -->
  <div id="success-screen">
    <div class="success-icon">🎉</div>
    <div class="success-title">شكراً لك!</div>
    <div class="success-sub">
      تم إرسال تقييمك بنجاح.<br>سيظهر على الموقع الرئيسي قريباً.
    </div>
    <button class="btn" style="margin-top:28px" onclick="resetForm()">
      <i class="fas fa-plus" style="margin-left:8px"></i> إضافة تقييم آخر
    </button>
  </div>

</div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
  /* ══════════════════════════════════════════════════
     🔧 REPLACE WITH YOUR FIREBASE CONFIG
     console.firebase.google.com → Project Settings → Your apps
     ══════════════════════════════════════════════════ */
  const firebaseConfig = {
    apiKey:            "REPLACE_API_KEY",
    authDomain:        "REPLACE_PROJECT_ID.firebaseapp.com",
    projectId:         "REPLACE_PROJECT_ID",
    storageBucket:     "REPLACE_PROJECT_ID.appspot.com",
    messagingSenderId: "REPLACE_SENDER_ID",
    appId:             "REPLACE_APP_ID"
  };

  /* ══════════════════════════════════════════════════
     🔑 كلمة المرور — غيّرها كما تشاء
     ══════════════════════════════════════════════════ */
  const ACCESS_PASSWORD = "PrimeIPTV@2026";

  /* ── Init ── */
  if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  /* ── Password check ── */
  function checkPass() {
    const val = document.getElementById('pass-input').value;
    if (val === ACCESS_PASSWORD) {
      document.getElementById('password-screen').style.display = 'none';
      document.getElementById('form-screen').style.display    = 'block';
    } else {
      document.getElementById('pass-err').textContent = '❌ كلمة المرور غير صحيحة';
    }
  }

  /* ── Submit review ── */
  async function submitReview() {
    const name    = document.getElementById('r-name').value.trim();
    const country = document.getElementById('r-country').value;
    const ratingEl= document.querySelector('input[name="rating"]:checked');
    const comment = document.getElementById('r-comment').value.trim();
    const errEl   = document.getElementById('form-err');

    errEl.textContent = '';

    if (!name)    return errEl.textContent = '⚠️ الرجاء إدخال اسمك';
    if (!country) return errEl.textContent = '⚠️ الرجاء اختيار دولتك';
    if (!ratingEl)return errEl.textContent = '⚠️ الرجاء تحديد التقييم بالنجوم';
    if (!comment) return errEl.textContent = '⚠️ الرجاء كتابة تعليقك';

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-left:8px"></i> جاري الإرسال...';

    try {
      await db.collection('reviews').add({
        name    : name,
        country : country,
        rating  : parseInt(ratingEl.value),
        comment : comment,
        approved: true,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      document.getElementById('form-screen').style.display    = 'none';
      document.getElementById('success-screen').style.display = 'block';
    } catch (e) {
      errEl.textContent = '❌ حدث خطأ في الاتصال، يرجى المحاولة لاحقاً';
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-paper-plane" style="margin-left:8px"></i> إرسال التقييم';
    }
  }

  /* ── Reset form ── */
  function resetForm() {
    ['r-name','r-comment'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('r-country').value = '';
    document.querySelectorAll('input[name="rating"]').forEach(r => r.checked = false);
    document.getElementById('form-err').textContent = '';
    const btn = document.getElementById('submit-btn');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane" style="margin-left:8px"></i> إرسال التقييم';
    document.getElementById('success-screen').style.display = 'none';
    document.getElementById('form-screen').style.display    = 'block';
  }
</script>
</body>
</html>
