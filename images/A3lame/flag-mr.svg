<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Green background -->
  <rect width="900" height="600" fill="#006233"/>
  <!-- Red top stripe -->
  <rect width="900" height="60" fill="#D01C1F"/>
  <!-- Red bottom stripe -->
  <rect y="540" width="900" height="60" fill="#D01C1F"/>
  <!-- Gold crescent -->
  <circle cx="450" cy="270" r="100" fill="#FFD700"/>
  <circle cx="450" cy="240" r="82" fill="#006233"/>
  <!-- Gold 5-pointed star (below crescent) -->
  <polygon fill="#FFD700" transform="translate(450,360)"
    points="0,-36 8.5,-12 32,-12 14,4 21,28 0,14 -21,28 -14,4 -32,-12 -8.5,-12"/>
</svg>
