<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Red vertical stripe on hoist -->
  <rect width="225" height="600" fill="#DB161B"/>
  <!-- White top stripe -->
  <rect x="225" width="675" height="200" fill="#FFFFFF"/>
  <!-- Red middle stripe -->
  <rect x="225" y="200" width="675" height="200" fill="#DB161B"/>
  <!-- Green bottom stripe -->
  <rect x="225" y="400" width="675" height="200" fill="#008000"/>
  <!-- Simplified emblem: crossed swords + khanjar (dagger) in white on red -->
  <g fill="#FFFFFF" transform="translate(112,100)">
    <!-- Khanjar (curved dagger) -->
    <path d="M0,-60 Q30,0 10,60 Q-5,70 -10,60 Q5,0 -20,-50Z"/>
    <!-- Crossed swords -->
    <rect x="-40" y="-8" width="80" height="10" rx="3" transform="rotate(45)"/>
    <rect x="-40" y="-8" width="80" height="10" rx="3" transform="rotate(-45)"/>
  </g>
</svg>
