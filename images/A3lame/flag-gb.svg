<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="600" fill="#012169"/>
  <!-- White St Andrew's diagonals -->
  <line x1="0" y1="0" x2="900" y2="600" stroke="#FFFFFF" stroke-width="200"/>
  <line x1="900" y1="0" x2="0" y2="600" stroke="#FFFFFF" stroke-width="200"/>
  <!-- Red St Patrick's diagonals -->
  <line x1="0" y1="0" x2="900" y2="600" stroke="#C8102E" stroke-width="80"/>
  <line x1="900" y1="0" x2="0" y2="600" stroke="#C8102E" stroke-width="80"/>
  <!-- White St George's cross -->
  <rect x="360" y="0" width="180" height="600" fill="#FFFFFF"/>
  <rect x="0" y="210" width="900" height="180" fill="#FFFFFF"/>
  <!-- Red St George's cross center -->
  <rect x="390" y="0" width="120" height="600" fill="#C8102E"/>
  <rect x="0" y="240" width="900" height="120" fill="#C8102E"/>
</svg>
