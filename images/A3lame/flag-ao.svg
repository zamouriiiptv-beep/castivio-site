<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="300" fill="#CC0000"/>
  <rect y="300" width="900" height="300" fill="#000000"/>
  <!-- Simplified gear (partial circle with teeth) -->
  <g transform="translate(450,300)">
    <!-- Gear body -->
    <circle cx="0" cy="0" r="60" fill="#FFCC00"/>
    <circle cx="0" cy="0" r="35" fill="#CC0000"/>
    <!-- Gear teeth (simplified) -->
    <rect x="-8" y="-75" width="16" height="20" fill="#FFCC00"/>
    <rect x="-8" y="55" width="16" height="20" fill="#FFCC00"/>
    <rect x="55" y="-8" width="20" height="16" fill="#FFCC00"/>
    <rect x="-75" y="-8" width="20" height="16" fill="#FFCC00"/>
    <rect x="37" y="-62" width="16" height="20" fill="#FFCC00" transform="rotate(45 45,-54)"/>
    <rect x="-53" y="-62" width="16" height="20" fill="#FFCC00" transform="rotate(-45 -45,-54)"/>
    <rect x="37" y="42" width="16" height="20" fill="#FFCC00" transform="rotate(-45 45,54)"/>
    <rect x="-53" y="42" width="16" height="20" fill="#FFCC00" transform="rotate(45 -45,54)"/>
    <!-- Machete (simplified diagonal slash) -->
    <rect x="-5" y="-90" width="10" height="180" rx="4" fill="#FFCC00" transform="rotate(-30 0 0)"/>
    <!-- Star -->
    <polygon fill="#FFCC00" transform="translate(-20,-20)" points="0,-14 3.3,-10.2 10,-11.4 5.3,-6.6 9,0 3.3,-2.8 0,3 -3.3,-2.8 -9,0 -5.3,-6.6 -10,-11.4 -3.3,-10.2"/>
  </g>
</svg>
