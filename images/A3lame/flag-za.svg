<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Red top band -->
  <rect width="900" height="200" fill="#DE3831"/>
  <!-- Blue bottom band -->
  <rect y="400" width="900" height="200" fill="#002395"/>
  <!-- Green center band -->
  <rect y="200" width="900" height="200" fill="#007A4D"/>
  <!-- Black triangle left -->
  <polygon fill="#000000" points="0,0 0,600 300,300"/>
  <!-- Gold Y-shape outline (white first then gold overlap) -->
  <polygon fill="#FFB612" points="0,0 0,110 260,300 0,490 0,600 360,300"/>
  <!-- White inner Y -->
  <polygon fill="#FFFFFF" points="0,0 0,70 220,300 0,530 0,600 320,300"/>
  <!-- Green inner fill to recreate Y shape -->
  <polygon fill="#007A4D" points="0,80 200,300 0,520 0,530 220,300 0,70"/>
</svg>
