<svg viewBox="0 0 70 116" xmlns="http://www.w3.org/2000/svg" width="70" height="116">
  <defs>
    <linearGradient id="lw" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7B2FFF"/>
      <stop offset="1" stop-color="#C86BFF"/>
    </linearGradient>
    <linearGradient id="lwh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E9D5FF"/>
      <stop offset="1" stop-color="#F5F3FF"/>
    </linearGradient>
    <filter id="lwg" x="-20%" y="-12%" width="140%" height="124%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- one classic laurel leaf: rounded almond, tip up -->
    <path id="leaf" d="M0,0 C6,-3.5 6.2,-13 0,-19 C-6.2,-13 -6,-3.5 0,0 Z"/>
  </defs>

  <g filter="url(#lwg)" opacity="0.78">
    <!-- curved central stem of the branch -->
    <path d="M26,110 C8,90 8,26 26,6" fill="none" stroke="#9333EA"
          stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>

    <!-- leaves: hand-placed along the stem, fanning inward toward the title -->
    <g fill="url(#lw)">
      <use href="#leaf" transform="translate(25,103) rotate(138) scale(0.80)"/>
      <use href="#leaf" transform="translate(16,94)  rotate(122) scale(0.88)"/>
      <use href="#leaf" transform="translate(10,82)  rotate(106) scale(0.96)"/>
      <use href="#leaf" transform="translate(8,68)   rotate(92)  scale(1.00)"/>
      <use href="#leaf" transform="translate(8,54)   rotate(78)  scale(1.00)"/>
      <use href="#leaf" transform="translate(10,40)  rotate(64)  scale(0.96)"/>
      <use href="#leaf" transform="translate(16,28)  rotate(48)  scale(0.88)"/>
      <use href="#leaf" transform="translate(25,17)  rotate(32)  scale(0.80)"/>
      <use href="#leaf" transform="translate(30,8)   rotate(20)  scale(0.66)"/>
    </g>

    <!-- soft inner highlight on each leaf -->
    <g fill="url(#lwh)" opacity="0.32">
      <use href="#leaf" transform="translate(25,103) rotate(138) scale(0.42)"/>
      <use href="#leaf" transform="translate(16,94)  rotate(122) scale(0.46)"/>
      <use href="#leaf" transform="translate(10,82)  rotate(106) scale(0.50)"/>
      <use href="#leaf" transform="translate(8,68)   rotate(92)  scale(0.52)"/>
      <use href="#leaf" transform="translate(8,54)   rotate(78)  scale(0.52)"/>
      <use href="#leaf" transform="translate(10,40)  rotate(64)  scale(0.50)"/>
      <use href="#leaf" transform="translate(16,28)  rotate(48)  scale(0.46)"/>
      <use href="#leaf" transform="translate(25,17)  rotate(32)  scale(0.42)"/>
    </g>
  </g>
</svg>
