<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- White hoist side -->
  <rect width="300" height="600" fill="#FFFFFF"/>
  <!-- Red fly side -->
  <rect x="300" width="600" height="600" fill="#CE1126"/>
  <!-- 5 white triangles (serration) pointing right into red -->
  <polygon fill="#FFFFFF" points="300,0 420,60 300,120"/>
  <polygon fill="#FFFFFF" points="300,120 420,180 300,240"/>
  <polygon fill="#FFFFFF" points="300,240 420,300 300,360"/>
  <polygon fill="#FFFFFF" points="300,360 420,420 300,480"/>
  <polygon fill="#FFFFFF" points="300,480 420,540 300,600"/>
</svg>
