<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Green triangles (left and right) -->
  <polygon fill="#009B3A" points="0,0 450,300 0,600"/>
  <polygon fill="#009B3A" points="900,0 450,300 900,600"/>
  <!-- Black triangles (top and bottom) -->
  <polygon fill="#000000" points="0,0 900,0 450,300"/>
  <polygon fill="#000000" points="0,600 900,600 450,300"/>
  <!-- Gold diagonal cross (saltire) -->
  <polygon fill="#FED100" points="0,0 60,0 450,300 840,0 900,0 900,60 450,300 900,540 900,600 840,600 450,300 60,600 0,600 0,540 450,300 0,60"/>
</svg>
