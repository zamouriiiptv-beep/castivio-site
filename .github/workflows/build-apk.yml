name: Build APK (arm64)

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    name: Flutter Build – Android arm64
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter 3.29.3 (with cache)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          cache: true
          cache-key: flutter-3.29.3-linux

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('prime-player/android/**/*.gradle*', 'prime-player/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Accept Android licenses
        run: flutter doctor --android-licenses || true

      - name: Get packages
        working-directory: prime-player
        run: flutter pub get

      - name: Build release APK (arm64)
        working-directory: prime-player
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --target-platform android-arm64 \
            --no-pub
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prime-player-arm64-${{ github.run_number }}
          path: prime-player/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: APK info
        run: |
          APK=prime-player/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          [ -f "$APK" ] && echo "✅ APK: $(du -sh $APK | cut -f1)" || echo "❌ APK not found"
