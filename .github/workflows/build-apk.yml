name: Build APK (arm64)

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    name: Flutter Build – Android arm64
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter 3.29.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: true

      - name: Get packages
        working-directory: prime-player
        run: flutter pub get

      - name: Build release APK (arm64)
        working-directory: prime-player
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --target-platform android-arm64 \
            --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prime-player-arm64-${{ github.sha }}
          path: prime-player/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
